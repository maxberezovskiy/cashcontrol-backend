services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cashcontrol
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/cashcontrol
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build: ../cashcontrol-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  bot:
    build: ../cashcontrol-bot
    restart: unless-stopped
    # Запускается только явно: docker compose --profile bot up
    profiles: ["bot"]
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000/api/v1
      BOT_TOKEN: ${BOT_TOKEN:-}
      BOT_API_SECRET: ${BOT_API_SECRET:-change-me-bot-secret}
      BOT_USERNAME: ${BOT_USERNAME:-}

volumes:
  postgres_data:
