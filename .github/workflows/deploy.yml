name: Deploy Backend

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to deploy (e.g. a git SHA for rollback). Empty = build current commit."
        required: false

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-push:
    # Skip the build when redeploying an existing tag (rollback)
    if: ${{ github.event.inputs.tag == '' || github.event.inputs.tag == null }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-push]
    # build-push is skipped entirely on rollback runs, so allow that
    if: ${{ !cancelled() && (needs.build-push.result == 'success' || needs.build-push.result == 'skipped') }}
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Pull and restart backend on VM
        uses: appleboy/ssh-action@v1.2.0
        env:
          TAG: ${{ github.event.inputs.tag || github.sha }}
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          envs: TAG
          script_stop: true
          script: |
            cd /opt/cashcontrol
            grep -q '^BACKEND_TAG=' .env && sed -i "s/^BACKEND_TAG=.*/BACKEND_TAG=$TAG/" .env || echo "BACKEND_TAG=$TAG" >> .env
            docker compose pull backend
            docker compose up -d backend
            # Smoke test through nginx: backend must answer before we call it done
            ok=""
            for i in $(seq 1 20); do
              if curl -fsS http://localhost/api/v1/docs > /dev/null; then ok=1; break; fi
              sleep 3
            done
            if [ -z "$ok" ]; then
              echo "Backend did not become healthy" >&2
              docker compose logs --tail 50 backend >&2
              exit 1
            fi
            docker image prune -f
