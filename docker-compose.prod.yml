services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-cashcontrol}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: ghcr.io/maxberezovskiy/cashcontrol-backend:${BACKEND_TAG:-latest}
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-cashcontrol}
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    image: ghcr.io/maxberezovskiy/cashcontrol-frontend:${FRONTEND_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

  bot:
    image: ghcr.io/maxberezovskiy/cashcontrol-bot:${BOT_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8000/api/v1
      BOT_TOKEN: ${BOT_TOKEN:?set BOT_TOKEN in .env}
      BOT_API_SECRET: ${BOT_API_SECRET:?set BOT_API_SECRET in .env}
      BOT_USERNAME: ${BOT_USERNAME:-}

volumes:
  postgres_data:
